[package]
name = "kubectui"
version = "0.1.0"
edition = "2024"

[dependencies]
ratatui = "0.30"
tokio = { version = "1", features = ["full"] }
kube = { version = "0.92", features = ["client"] }
k8s-openapi = { version = "0.22", features = ["v1_30"] }
anyhow = "1"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
clap = { version = "4", features = ["derive"] }
crossterm = "0.29"
log = "0.4"
env_logger = "0.11"
chrono = { version = "0.4", features = ["serde"] }
