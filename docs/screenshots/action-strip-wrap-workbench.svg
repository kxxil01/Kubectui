<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="170" viewBox="0 0 1400 170" role="img" aria-label="Workbench log header wraps instead of cropping controls">
  <rect width="1400" height="170" fill="#1f2430"/>
  <rect x="10" y="10" width="1380" height="150" rx="8" fill="#2a3040" stroke="#7aa2f7" stroke-width="2"/>
  <rect x="20" y="20" width="1360" height="120" rx="4" fill="#2f3546"/>
  <text x="34" y="56" fill="#e5c07b" font-family="Menlo, Monaco, monospace" font-size="28">paused</text>
  <text x="146" y="56" fill="#d8dee9" font-family="Menlo, Monaco, monospace" font-size="28">container: init-keto-schema</text>
  <text x="632" y="56" fill="#d8dee9" font-family="Menlo, Monaco, monospace" font-size="28">[json summary ON]</text>
  <text x="936" y="56" fill="#d8dee9" font-family="Menlo, Monaco, monospace" font-size="28">[window all]</text>
  <text x="1120" y="56" fill="#d8dee9" font-family="Menlo, Monaco, monospace" font-size="28">[Esc] back</text>
  <text x="34" y="96" fill="#d8dee9" font-family="Menlo, Monaco, monospace" font-size="28">[f] follow  [P] previous  [t] timestamps  [/] search  [R] regex/text</text>
  <text x="34" y="132" fill="#d8dee9" font-family="Menlo, Monaco, monospace" font-size="28">[W] window  [T] jump-to-time  [C] correlate  [J] json  Search: off (text, all)</text>
  <text x="20" y="158" fill="#98c379" font-family="Menlo, Monaco, monospace" font-size="22">after: workbench header reserves wrapped height, controls stay visible</text>
</svg>
