name: Release

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"
      - "v[0-9]+.[0-9]+.[0-9]+-*"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"
  BINARY_NAME: kubectui

jobs:
  # Verify the tag version matches Cargo.toml
  verify-version:
    name: Verify version
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - name: Check version consistency
        env:
          REF_NAME: ${{ github.ref_name }}
        run: |
          TAG_VERSION="${REF_NAME#v}"
          CARGO_VERSION=$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)".*/\1/')
          if [ "$TAG_VERSION" != "$CARGO_VERSION" ]; then
            echo "Tag version ($TAG_VERSION) does not match Cargo.toml version ($CARGO_VERSION)"
            exit 1
          fi
          echo "Version verified: $TAG_VERSION"

  build:
    name: Build (${{ matrix.target }})
    needs: verify-version
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            archive: tar.gz
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            archive: tar.gz
            cross: true
          - target: x86_64-apple-darwin
            os: macos-latest
            archive: tar.gz
          - target: aarch64-apple-darwin
            os: macos-latest
            archive: tar.gz

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Install cross-compilation tools
        if: matrix.cross
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> "$GITHUB_ENV"

      - name: Build release binary
        run: cargo build --release --locked --target ${{ matrix.target }}

      - name: Package artifact
        env:
          REF_NAME: ${{ github.ref_name }}
          TARGET: ${{ matrix.target }}
        run: |
          ARCHIVE_NAME="${BINARY_NAME}-${REF_NAME}-${TARGET}"
          mkdir -p "dist/${ARCHIVE_NAME}"
          cp "target/${TARGET}/release/${BINARY_NAME}" "dist/${ARCHIVE_NAME}/"
          [ -f README.md ] && cp README.md "dist/${ARCHIVE_NAME}/"
          [ -f LICENSE ] && cp LICENSE "dist/${ARCHIVE_NAME}/"
          cd dist
          tar czf "${ARCHIVE_NAME}.tar.gz" "${ARCHIVE_NAME}"
          shasum -a 256 "${ARCHIVE_NAME}.tar.gz" > "${ARCHIVE_NAME}.tar.gz.sha256"

      - uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.target }}
          path: dist/*.tar.gz*

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: release-*
          merge-multiple: true

      - name: Generate release notes
        env:
          REF_NAME: ${{ github.ref_name }}
        run: |
          echo "## What's Changed" > release-notes.md
          echo "" >> release-notes.md
          PREV_TAG=$(git tag --sort=-v:refname | grep -E '^v[0-9]' | head -2 | tail -1)
          if [ -n "$PREV_TAG" ] && [ "$PREV_TAG" != "$REF_NAME" ]; then
            git log "${PREV_TAG}..${REF_NAME}" --pretty=format:"- %s" --no-merges >> release-notes.md
          else
            git log --pretty=format:"- %s" --no-merges -20 >> release-notes.md
          fi
          echo "" >> release-notes.md
          echo "" >> release-notes.md
          echo "## Install" >> release-notes.md
          echo "" >> release-notes.md
          echo "### Homebrew (macOS / Linux)" >> release-notes.md
          echo '```bash' >> release-notes.md
          echo "brew install kxxil01/tap/kubectui" >> release-notes.md
          echo '```' >> release-notes.md
          echo "" >> release-notes.md
          echo "### Manual" >> release-notes.md
          echo "Download the archive for your platform, extract, and place \`kubectui\` in your PATH:" >> release-notes.md
          echo '```bash' >> release-notes.md
          echo "tar xzf kubectui-${REF_NAME}-<target>.tar.gz" >> release-notes.md
          echo "sudo mv kubectui-${REF_NAME}-<target>/kubectui /usr/local/bin/" >> release-notes.md
          echo '```' >> release-notes.md
          echo "" >> release-notes.md
          echo "## Checksums" >> release-notes.md
          echo '```' >> release-notes.md
          cat artifacts/*.sha256 >> release-notes.md
          echo '```' >> release-notes.md

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          IS_PRERELEASE=""
          if echo "$REF_NAME" | grep -qE '\-(alpha|beta|rc)'; then
            IS_PRERELEASE="--prerelease"
          fi
          gh release create "$REF_NAME" \
            --title "$REF_NAME" \
            --notes-file release-notes.md \
            $IS_PRERELEASE \
            artifacts/*.tar.gz artifacts/*.sha256

  # Update Homebrew formula with new version and checksums
  homebrew:
    name: Update Homebrew formula
    needs: release
    runs-on: ubuntu-latest
    if: ${{ !contains(github.ref_name, '-') }}
    timeout-minutes: 10
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: release-*
          merge-multiple: true

      - name: Compute checksums and update formula
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          VERSION="${REF_NAME#v}"

          SHA_DARWIN_ARM64=$(cat artifacts/kubectui-${REF_NAME}-aarch64-apple-darwin.tar.gz.sha256 | awk '{print $1}')
          SHA_DARWIN_X86=$(cat artifacts/kubectui-${REF_NAME}-x86_64-apple-darwin.tar.gz.sha256 | awk '{print $1}')
          SHA_LINUX_ARM64=$(cat artifacts/kubectui-${REF_NAME}-aarch64-unknown-linux-gnu.tar.gz.sha256 | awk '{print $1}')
          SHA_LINUX_X86=$(cat artifacts/kubectui-${REF_NAME}-x86_64-unknown-linux-gnu.tar.gz.sha256 | awk '{print $1}')

          cat > kubectui.rb <<EOF
          class Kubectui < Formula
            desc "Keyboard-first terminal UI for Kubernetes operations"
            homepage "https://github.com/kxxil01/Kubectui"
            version "${VERSION}"
            license "MIT"

            on_macos do
              if Hardware::CPU.arm?
                url "https://github.com/kxxil01/Kubectui/releases/download/v#{version}/kubectui-v#{version}-aarch64-apple-darwin.tar.gz"
                sha256 "${SHA_DARWIN_ARM64}"
              else
                url "https://github.com/kxxil01/Kubectui/releases/download/v#{version}/kubectui-v#{version}-x86_64-apple-darwin.tar.gz"
                sha256 "${SHA_DARWIN_X86}"
              end
            end

            on_linux do
              if Hardware::CPU.arm?
                url "https://github.com/kxxil01/Kubectui/releases/download/v#{version}/kubectui-v#{version}-aarch64-unknown-linux-gnu.tar.gz"
                sha256 "${SHA_LINUX_ARM64}"
              else
                url "https://github.com/kxxil01/Kubectui/releases/download/v#{version}/kubectui-v#{version}-x86_64-unknown-linux-gnu.tar.gz"
                sha256 "${SHA_LINUX_X86}"
              end
            end

            def install
              bin.install "kubectui"
            end

            test do
              assert_match version.to_s, shell_output("#{bin}/kubectui --version")
            end
          end
          EOF

          # Remove leading whitespace from heredoc
          sed -i 's/^          //' kubectui.rb

          # Get current formula SHA for update
          CURRENT_SHA=$(gh api repos/kxxil01/homebrew-tap/contents/Formula/kubectui.rb --jq '.sha')

          # Push updated formula
          gh api repos/kxxil01/homebrew-tap/contents/Formula/kubectui.rb \
            --method PUT \
            --field message="kubectui ${VERSION}" \
            --field content="$(base64 -w0 kubectui.rb)" \
            --field sha="$CURRENT_SHA"
